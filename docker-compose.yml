services:
  rocketride:
    image: ghcr.io/rocketride-org/rocketride-engine:latest
    ports:
      - "5565:5565"
    volumes:
      # Reuse the same bootstrap data as ./scripts/start-rocketride.sh
      - ./.data/rocketride:/opt/data
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
      - path: backend/.env
        required: false
    environment:
      ROCKETRIDE_URI: http://rocketride:5565
      ROCKETRIDE_APIKEY: ${ROCKETRIDE_APIKEY:-MYAPIKEY}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      - rocketride
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
